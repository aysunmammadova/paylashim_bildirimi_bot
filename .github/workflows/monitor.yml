name: FB Monitor

on:
  schedule:
    - cron: "0 */2 * * *"   # hər 2 saatdan bir (UTC)
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Repo-nu yüklə
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Python qur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: seen_posts.json yoxdursa yarat
        run: |
          if [ ! -f seen_posts.json ]; then
            echo "[]" > seen_posts.json
          fi

      - name: Asılılıqları yüklə
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Scraper-i işlət
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper.py

      - name: seen_posts.json-u commit et
        run: |
          git config user.name  "fb-monitor-bot"
          git config user.email "bot@fb-monitor"
          git add seen_posts.json
          git diff --cached --quiet || git commit -m "chore: seen posts yeniləndi [skip ci]"
          git push
